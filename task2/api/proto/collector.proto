syntax = "proto3";

option go_package = "github.com/ArtemNik1tin/distributed-github/api/proto/gen";

message RepositoryRequest {
    string owner_name = 1;
    string repo_name = 2;
}

message RepositoryResponse {
    string name = 1;
    string description = 2;
    int32 stars = 3;
    int32 forks = 4;
    string created_at = 5;
}

service CollectorService {
    rpc GetRepository (RepositoryRequest) returns (RepositoryResponse);
}