services:
  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    ports:
      - "50051:50051"
    networks:
      - github-network

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - COLLECTOR_ADDR=collector:50051
    depends_on:
      - collector
    networks:
      - github-network

networks:
  github-network:
    driver: bridge