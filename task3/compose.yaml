services:
  processor:
    image: processor:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.processor
    container_name: processor
    restart: unless-stopped
    ports:
      - 50001:50001
    volumes:
      - ./repo-stat/processor/config/config.yaml:/config.yaml
    environment:
      - services.collector=collector:50002
    depends_on:
      - collector

  collector:
    image: collector:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.collector
    container_name: collector
    restart: unless-stopped
    volumes:
      - ./repo-stat/collector/config/config.yaml:/config.yaml

  api:
    image: api:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - 28080:8080
    volumes:
      - ./repo-stat/api/config/config.yaml:/config.yaml
    environment:
      - SUBSCRIBER_ADDRESS=subscriber:8080
      - PROCESSOR_ADDRESS=processor:50001
    depends_on:
      - processor
      - subscriber

  subscriber:
    image: subscriber:latest
    build:
      context: repo-stat
      dockerfile: Dockerfile.subscriber
    container_name: subscriber
    restart: unless-stopped
    ports:
      - 28081:8080
    volumes:
      - ./repo-stat/subscriber/config/config.yaml:/config.yaml
    environment:
      - API_ADDRESS=api:8080
  tests:
    image: tests:latest
    build:
      context: tests
    container_name: tests
    restart: "no"
    depends_on:
      - api
    entrypoint: ["true"]