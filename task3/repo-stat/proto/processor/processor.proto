syntax = "proto3";

package processor.v1;

option go_package =
    "repo-stat/proto/processor;processorpb";

service Processor {
  rpc GetRepositoryInfo(GetRepositoryInfoRequest)
      returns (GetRepositoryInfoResponse);
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {
}

message PingResponse {
  string reply = 1;
}

message GetRepositoryInfoRequest {
  string owner = 1;
  string repo = 2;
}

message GetRepositoryInfoResponse {
  string full_name = 1;
  string description = 2;
  uint32 stars = 3;
  uint32 forks = 4;
  string created_at = 5;
}
